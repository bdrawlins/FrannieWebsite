name: Deploy Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate site config
        run: python3 scripts/build_site_config.py
        env:
          FRANNIE_FORMSPARK_FORM_URL: ${{ vars.FRANNIE_FORMSPARK_FORM_URL }}
          FRANNIE_PUBLIC_CALENDAR_ID: ${{ vars.FRANNIE_PUBLIC_CALENDAR_ID }}
          FRANNIE_TIME_ZONE: ${{ vars.FRANNIE_TIME_ZONE }}
          FRANNIE_CONTACT_EMAIL: ${{ vars.FRANNIE_CONTACT_EMAIL }}
          FRANNIE_CONTACT_PHONE_DISPLAY: ${{ vars.FRANNIE_CONTACT_PHONE_DISPLAY }}
          FRANNIE_CONTACT_PHONE_TEL: ${{ vars.FRANNIE_CONTACT_PHONE_TEL }}
          FRANNIE_FACEBOOK_URL: ${{ vars.FRANNIE_FACEBOOK_URL }}
          FRANNIE_YELP_URL: ${{ vars.FRANNIE_YELP_URL }}
          FRANNIE_APPS_SCRIPT_WEB_APP_URL: ${{ vars.FRANNIE_APPS_SCRIPT_WEB_APP_URL }}
          FRANNIE_BOTPOISON_PUBLIC_KEY: ${{ vars.FRANNIE_BOTPOISON_PUBLIC_KEY }}

      - name: Prepare static artifact
        run: |
          mkdir -p public
          cp index.html about.html index.css site-config.js CNAME robots.txt sitemap.xml public/
          cp -R assets public/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
